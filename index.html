<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAS PRI - Manajemen Kepegawaian</title>

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <link href="assets/vendor/google-fonts.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/vendor/bootstrap-icons.css">

  <link href="assets/vendor/bootstrap-4.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/vendor/select2.min.css" />
  <link rel="stylesheet" href="assets/vendor/select2-bootstrap-5-theme.min.css" />

  <link rel="stylesheet" href="style.css?v=2.1">

  <script type="importmap">
    {
        "imports": {
            "vue": "./assets/vendor/vue.esm-browser.prod.js",
            "vue-router": "./assets/vendor/vue-router.esm-browser.js",
            "@vue/devtools-api": "./assets/vendor/vue-devtools-api.js"
        }
    }
    </script>

  <style>
    [v-cloak] {
      display: none;
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(5px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      font-family: 'Inter', sans-serif;
    }

    .loading-content {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .pulse-ring {
      position: absolute;
      width: 120px;
      height: 120px;
      border: 4px solid var(--bs-primary);
      border-radius: 50%;
      opacity: 0;
      animation: pulse-animation 2s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
    }

    .pulse-ring.delay {
      animation-delay: 0.5s;
    }

    .brand-text {
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: 3px;
      color: #333;
      z-index: 2;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .loading-status {
      font-size: 0.85rem;
      color: #6c757d;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 60px;
    }

    @keyframes pulse-animation {
      0% {
        transform: scale(0.5);
        opacity: 0.8;
        border-width: 4px;
      }

      100% {
        transform: scale(1.5);
        opacity: 0;
        border-width: 0px;
      }
    }

    .dot-1,
    .dot-2,
    .dot-3 {
      opacity: 0;
      animation: dot-fade 1.5s infinite;
    }

    .dot-1 {
      animation-delay: 0.0s;
    }

    .dot-2 {
      animation-delay: 0.2s;
    }

    .dot-3 {
      animation-delay: 0.4s;
    }

    @keyframes dot-fade {

      0%,
      100% {
        opacity: 0;
      }

      50% {
        opacity: 1;
      }
    }
  </style>
</head>

<body class="bg-light">

  <div id="app" v-cloak>
    <div v-if="store.isLoading" class="loading-overlay">
      <div class="loading-content">
        <div class="pulse-ring"></div>
        <div class="pulse-ring delay"></div>

        <div class="brand-text">
          <span class="letter">M</span><span class="letter">A</span><span class="letter">S</span>
          <span class="ms-2 letter text-primary">P</span><span class="letter text-primary">R</span><span
            class="letter text-primary">I</span>
        </div>

        <div class="loading-status">
          Memproses Data
          <span class="dot-1">.</span><span class="dot-2">.</span><span class="dot-3">.</span>
        </div>
      </div>
    </div>

    <router-view></router-view>
  </div>

  <script src="assets/vendor/bootstrap.bundle.min.js"></script>
  <script src="assets/vendor/jquery-3.7.1.min.js"></script>
  <script src="assets/vendor/sweetalert2.all.min.js"></script>

  <script src="assets/vendor/xlsx.full.min.js"></script>
  <script src="assets/vendor/pizzip.js"></script>
  <script src="assets/vendor/docxtemplater.js"></script>
  <script src="assets/vendor/FileSaver.min.js"></script>
  <script src="assets/vendor/jszip.min.js"></script>
  <script src="assets/vendor/docx-preview.min.js"></script>

  <script src="assets/vendor/select2.min.js"></script>
  <script src="assets/vendor/chart.js"></script>

  <script type="module" src="./js/main.js?v=2.1"></script>

  <script type="module">
    import { getFirestore, collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { db } from "./js/firebase.js";

    window.patchPerpresGaji = async function () {
      try {
        const querySnapshot = await getDocs(collection(db, "master_gaji"));
        let count = 0;
        let promises = [];
        console.log(`Menemukan ${querySnapshot.size} total data gaji.`);

        querySnapshot.forEach((document) => {
          const data = document.data();

          // Filter: we add Perpres to ALL PNS Golongan (I, II, III, IV)
          // We assume it's PNS and not PPPK if it starts with I, V, X, or contains /a, /b
          const isPns = document.id.includes('I') || document.id.includes('V') || document.id.includes('A') || document.id.includes('B') || document.id.includes('C') || document.id.includes('D');

          if (isPns) {
            const docRef = doc(db, "master_gaji", document.id);
            promises.push(updateDoc(docRef, { "perpres": "Peraturan Pemerintah Nomor 5 Tahun 2024" }));
            count++;
          }
        });

        await Promise.all(promises);
        alert(`BERHASIL: Menambahkan perpres ke ${count} tabel master_gaji PNS!`);
      } catch (error) {
        console.error("Gagal update data gaji:", error);
        alert("GAGAL update data gaji: " + error.message);
      }
    };
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        // Register SW dengan timestamp agar browser ngecek update
        navigator.serviceWorker.register('./sw.js?v=' + new Date().getTime())
          .then((registration) => {
            console.log('SW Registered:', registration.scope);

            // Cek update saat ini juga
            registration.update();

            registration.onupdatefound = () => {
              const installingWorker = registration.installing;
              installingWorker.onstatechange = () => {
                if (installingWorker.state === 'installed') {
                  if (navigator.serviceWorker.controller) {
                    console.log('New content available, please refresh.');
                    // Opsional: Paksa reload jika ada update kritikal
                    // window.location.reload(); 
                  } else {
                    console.log('Content is cached for offline use.');
                  }
                }
              };
            };
          })
          .catch((err) => {
            console.log('SW Registration failed:', err);
          });
      });
    }
  </script>
</body>

</html>
