<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMPEG KGB</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-bootstrap-4/bootstrap-4.css" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>

    <script src="https://unpkg.com/pizzip@3.1.4/dist/pizzip.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.40.0/docxtemplater.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" />
    <link rel="stylesheet" href="style.css">

    <script type="importmap">
    {
        "imports": {
            "vue": "https://unpkg.com/vue@3.3.4/dist/vue.esm-browser.prod.js",
            "vue-router": "https://unpkg.com/vue-router@4.0.15/dist/vue-router.esm-browser.js",
            "@vue/devtools-api": "https://unpkg.com/@vue/devtools-api@6.5.0/lib/esm/index.js"
        }
    }
    </script>
    
    </head>
<body class="bg-light">

    <div id="app" v-cloak>
        
        <div v-show="store.isLoading" class="loading-overlay">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>

        <nav v-if="store.user" class="navbar navbar-expand navbar-dark bg-primary shadow-sm mb-4">
            <div class="container">
                <span class="navbar-brand fw-bold">SIMPEG KGB</span>
                <div class="d-flex align-items-center">
                    <span class="text-white small me-3 d-none d-md-block">{{ store.user.email }}</span>
                    <button @click="logout" class="btn btn-sm btn-danger">Keluar</button>
                </div>
            </div>
        </nav>

        <div class="container">
            <component :is="currentViewComponent"></component>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/pizzip/dist/pizzip.min.js"></script>
    <script src="https://unpkg.com/docxtemplater/build/docxtemplater.js"></script>
    <script src="https://unpkg.com/file-saver/dist/FileSaver.min.js"></script>

    <script src="https://unpkg.com/jszip/dist/jszip.min.js"></script>
    <script src="https://unpkg.com/docx-preview/dist/docx-preview.min.js"></script>
    <script type="module" src="./js/main.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>
</html>
